name: ClickUp scheduled sync

# Dispara a mesma function de sync (functions/clickup-webhook.js) via HTTP, de 45 em
# 45 minutos, só em dias úteis e horário comercial (08:30–18:15, América/São_Paulo,
# UTC-3 sem horário de verão). Os horários abaixo já estão convertidos pra UTC, que é
# o fuso que o GitHub Actions usa pra cron. Substitui o webhook em tempo real do
# ClickUp — não depende de eventos, só roda nesses horários fixos.

on:
  schedule:
    - cron: '30 11,14,17,20 * * 1-5'
    - cron: '15 12,15,18,21 * * 1-5'
    - cron: '0 13,16,19 * * 1-5'
    - cron: '45 13,16,19 * * 1-5'
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger sync
        env:
          SYNC_SECRET: ${{ secrets.CLICKUP_WEBHOOK_SECRET }}
        run: |
          BODY='{"event":"scheduledSync"}'
          SIG=$(printf '%s' "$BODY" | openssl dgst -sha256 -hmac "$SYNC_SECRET" | sed 's/^.* //')
          HTTP_STATUS=$(curl -sS -o response.txt -w '%{http_code}' -X POST \
            https://clientes.vanzaklabs.com/clickup-webhook \
            -H 'Content-Type: application/json' \
            -H "X-Signature: $SIG" \
            -d "$BODY")
          echo "HTTP $HTTP_STATUS"
          cat response.txt
          if [ "$HTTP_STATUS" -ge 400 ]; then
            echo "::error::Sync failed with HTTP $HTTP_STATUS"
            exit 1
          fi
